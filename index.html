<!DOCTYPE html>
<html>
<head>
    <title>My Personal Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            padding: 50px 20px;
            background: #1e293b;
        }

        h1 {
            margin: 0;
            font-size: 36px;
        }

        p {
            color: #cbd5e1;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .section {
            padding: 40px 20px;
        }

        .card {
            background: #1e293b;
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            border-radius: 10px;
        }

        footer {
            padding: 20px;
            background: #020617;
        }
    </style>
</head>

<body>

<header>
    <h1>Your Name</h1>
    <p>Welcome to my personal website</p>
    <button class="btn" onclick="alert('Thanks for visiting!')">Explore</button>
</header>

<div class="section">
    <div class="card">
        <h2>About Me</h2>
        <p>This is a simple personal website. You can write anything about yourself here.</p>
    </div>

    <div class="card">
        <h2>My Work</h2>
        <p>You can add your projects, skills, or achievements here.</p>
    </div>

    <div class="card">
        <h2>Contact</h2>
        <p>Email: your-email@gmail.com</p>
    </div>
</div>

<footer>
    <p>© 2026 Your Name</p>
</footer>

</body>
</html>
