<!DOCTYPE html>
<html>
<head>
    <title>Cognix - EdTech Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FAVICON -->
    <link rel="icon" href="cognix.png">

    <!-- GOOGLE ANALYTICS -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HLRPFWW8SX"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HLRPFWW8SX');
    </script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg,#0f172a,#1e3a8a);
            color: white;
            transition: 0.3s;
        }

        .dark-mode {
            background: #020617;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        header {
            text-align: center;
            padding: 80px 20px;
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 48px;
            margin: 10px 0;
        }

        .tagline {
            color: #cbd5f5;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 30px;
            background: linear-gradient(135deg,#38bdf8,#6366f1);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .section {
            padding: 50px 20px;
            text-align: center;
        }

        .search {
            padding: 10px;
            width: 260px;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }

        .pdf-box {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            margin: 10px auto;
            width: 260px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .pdf-box:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.15);
        }

        .pdf-box a {
            color: white;
            text-decoration: none;
        }

        .new {
            color: #38bdf8;
            font-size: 12px;
            margin-left: 5px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.4);
        }

        footer a {
            color: #38bdf8;
            margin: 0 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#resources">Resources</a>
    <a href="#contact">Contact</a>
</nav>

<header>

    <img src="cognix.png" class="logo">

    <h1>Cognix</h1>
    <p class="tagline">Intelligent Learning Powered by Technology</p>

    <button class="btn" onclick="scrollToSection()">Explore</button>
    <button class="btn" onclick="toggleDarkMode()">🌙 Dark</button>

</header>

<div class="section" id="main-content">

    <!-- SEARCH -->
    <input type="text" class="search" placeholder="Search notes..." onkeyup="searchPDF(this.value)">

    <!-- SUBJECTS -->

    <h2>📘 English</h2>

    <div class="pdf-box">
        <a href="root-word.pdf" target="_blank" onclick="trackPDF('Root Words')">
        📄 Root Words <span class="new">NEW</span>
        </a>
    </div>

    <div class="pdf-box">
        <a href="confuse-word-updated.pdf" target="_blank" onclick="trackPDF('Confusing Words')">
        📄 Confusing Words
        </a>
    </div>

    <h2>📗 General Studies</h2>

    <div class="pdf-box">
        <a href="gs-notes.pdf" target="_blank" onclick="trackPDF('GS Notes')">
        📄 GS Notes
        </a>
    </div>

    <h2>📙 Mathematics</h2>

    <div class="pdf-box">
        <a href="math-notes.pdf" target="_blank" onclick="trackPDF('Math Notes')">
        📄 Math Notes
        </a>
    </div>

</div>

<footer>

    <p>© 2026 ASUTOSH PADHI | Cognix</p>

    <p>
        <a href="https://linkedin.com" target="_blank">LinkedIn</a>
        <a href="https://github.com" target="_blank">GitHub</a>
    </p>

    <p>
        <a href="mailto:asutoshpadhi7475@gmail.com">Email Me</a>
    </p>

</footer>

<script>

function scrollToSection() {
    document.getElementById("main-content").scrollIntoView({
        behavior: "smooth"
    });
}

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}

function searchPDF(value) {
    let boxes = document.querySelectorAll(".pdf-box");
    value = value.toLowerCase();

    boxes.forEach(box => {
        let text = box.innerText.toLowerCase();
        box.style.display = text.includes(value) ? "block" : "none";
    });
}

/* 🔥 TRACK PDF CLICKS */
function trackPDF(name) {
    gtag('event', 'pdf_download', {
        'event_category': 'engagement',
        'event_label': name
    });
}

</script>

</body>
</html>
